{{ define "main" }}
<article class="post note">
  <header class="post-header">
    <div class="post-header__meta">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05" }}">{{ .Date.Format "January 2, 2006 · 15:04" }}</time>
    </div>
  </header>
  <div class="post-body prose prose--compact">{{ .Content }}</div>
  <footer class="post-footer">{{ partial "tags.html" . }}</footer>
</article>
{{ end }}
