<footer class="site-footer">
  <div class="wrap wrap--wide site-footer__inner">
    {{- with .Site.Menus.footer }}
    <ul class="site-footer__nav">
      {{- range . }}
      <li><a href="{{ .URL | relURL }}"{{ if strings.HasPrefix .URL "http" }} rel="me"{{ end }}>{{ .Name }}</a></li>
      {{- end }}
    </ul>
    {{- end }}
    <p class="site-footer__copyright">
      &copy; {{ now.Format "2006" }} {{ .Site.Params.author.display_name | default .Site.Title }}.
      Built with <a href="https://gohugo.io">Hugo</a> &amp; <a href="https://github.com/jbfriedrich/tinycss">tinycss</a>.
    </p>
  </div>
</footer>
