{{- $p := .Paginator -}}
{{- if gt $p.TotalPages 1 -}}
<nav class="pagination" aria-label="Pagination">
  {{ if $p.HasPrev }}<a rel="prev" href="{{ $p.Prev.URL }}">&larr; Newer</a>{{ else }}<span></span>{{ end }}
  <span class="pagination__page">Page {{ $p.PageNumber }} of {{ $p.TotalPages }}</span>
  {{ if $p.HasNext }}<a rel="next" href="{{ $p.Next.URL }}">Older &rarr;</a>{{ else }}<span></span>{{ end }}
</nav>
{{- end -}}
