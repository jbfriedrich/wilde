{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-header__meta">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05" }}">{{ .Date.Format "January 2, 2006" }}</time>
    </div>
  </header>
  <div class="post-body prose">{{ .Content }}</div>
  <footer class="post-footer">{{ partial "tags.html" . }}</footer>
</article>
{{ end }}
